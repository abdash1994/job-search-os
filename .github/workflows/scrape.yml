name: Scrape Remote Jobs

on:
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      once:
        description: "Run once and exit (vs continuous mode)"
        required: false
        default: "true"
        type: boolean

jobs:
  scrape:
    name: Scrape all job boards
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        working-directory: scraper
        run: playwright install chromium --with-deps

      - name: Install Tor (fallback proxy)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor
          sudo service tor start
          sleep 5
          echo "Tor status:"
          sudo service tor status

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCORING_PROVIDER: ${{ secrets.SCORING_PROVIDER || 'tfidf' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          LOG_LEVEL: INFO
          REQUEST_DELAY_MIN: 2
          REQUEST_DELAY_MAX: 9
          MAX_PROXY_RETRIES: 5
        run: python main.py --once

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/logs/
          retention-days: 7
          if-no-files-found: ignore
